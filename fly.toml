# fly.toml app configuration file generated for pick4me on 2026-05-26T22:05:57Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'pick4me'
primary_region = 'sjc'

[env]
  APP_ENV = "production"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
